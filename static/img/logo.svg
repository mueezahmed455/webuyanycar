<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#e0c04d"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylised speed/road mark -->
  <g transform="translate(4,4)">
    <!-- Outer ring -->
    <circle cx="22" cy="22" r="21" fill="none" stroke="#0a1628" stroke-width="2.5"/>
    <!-- Inner accent ring -->
    <circle cx="22" cy="22" r="15" fill="none" stroke="url(#g)" stroke-width="2" stroke-dasharray="6 3"/>
    <!-- Speed arrow -->
    <polygon points="22,6 29,22 22,18 15,22" fill="url(#g)"/>
    <!-- Road line -->
    <line x1="8" y1="30" x2="36" y2="30" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Car silhouette dots -->
    <circle cx="14" cy="36" r="3.5" fill="#0a1628"/>
    <circle cx="30" cy="36" r="3.5" fill="#0a1628"/>
    <circle cx="14" cy="36" r="1.2" fill="url(#g)"/>
    <circle cx="30" cy="36" r="1.2" fill="url(#g)"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="24" font-family="'Inter',Arial,Helvetica,sans-serif" font-weight="900" font-size="18" fill="#0a1628" letter-spacing="-0.3">webuy</text>
  <text x="115" y="24" font-family="'Inter',Arial,Helvetica,sans-serif" font-weight="900" font-size="18" fill="url(#g)" letter-spacing="-0.3">any</text>
  <text x="153" y="24" font-family="'Inter',Arial,Helvetica,sans-serif" font-weight="900" font-size="18" fill="#0a1628" letter-spacing="-0.3">vehicle</text>

  <!-- UK badge -->
  <rect x="228" y="9" width="32" height="16" rx="4" fill="url(#g)"/>
  <text x="244" y="21" font-family="'Inter',Arial,Helvetica,sans-serif" font-weight="800" font-size="9" fill="#0a1628" text-anchor="middle" letter-spacing="1">UK</text>

  <!-- Tagline -->
  <text x="58" y="46" font-family="'Inter',Arial,Helvetica,sans-serif" font-weight="700" font-size="7.5" fill="#4a5568" letter-spacing="1.2">LICENSED MOTOR TRADER</text>
</svg>
