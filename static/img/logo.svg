<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d4a"/>
    </linearGradient>
  </defs>

  <!-- Shield Badge Background -->
  <path d="M30 2 L50 2 L58 12 L58 38 L50 50 L30 50 L22 38 L22 12 Z" fill="url(#shieldGrad)" stroke="#c9a227" stroke-width="2"/>

  <!-- Car Silhouette -->
  <g fill="#ffffff">
    <!-- Car body -->
    <path d="M28 32 L32 24 L40 22 L48 24 L52 32 L52 36 L28 36 Z"/>
    <!-- Windows -->
    <path d="M33 25 L39 23 L45 25 L45 28 L33 28 Z" fill="#c9a227" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="34" cy="36" r="4" fill="#0a1628" stroke="#c9a227" stroke-width="1.5"/>
    <circle cx="46" cy="36" r="4" fill="#0a1628" stroke="#c9a227" stroke-width="1.5"/>
    <!-- Wheel hubs -->
    <circle cx="34" cy="36" r="1.5" fill="#c9a227"/>
    <circle cx="46" cy="36" r="1.5" fill="#c9a227"/>
    <!-- Headlight -->
    <ellipse cx="51" cy="30" rx="1.5" ry="2" fill="#c9a227"/>
  </g>

  <!-- Brand Text -->
  <text x="68" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="16" fill="#0a1628" letter-spacing="-0.5">WeBuy</text>
  <text x="68" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="16" fill="#0a1628" letter-spacing="-0.5">AnyCar</text>

  <!-- UK Badge -->
  <rect x="140" y="18" width="32" height="16" rx="3" fill="#c9a227"/>
  <text x="156" y="29" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="9" fill="#0a1628" text-anchor="middle">UK</text>
</svg>
