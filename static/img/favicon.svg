<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="webuyanyvehicle">
  <defs>
    <linearGradient id="gold-horiz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#e8c652"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="gold-radial" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0d375"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="navy-radial" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1a2d4a"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </linearGradient>
  </defs>
  <!-- Outer disc -->
  <circle cx="24" cy="24" r="22" fill="url(#navy-radial)" stroke="url(#gold-horiz)" stroke-width="2"/>
  <!-- Inner dashed ring -->
  <circle cx="24" cy="24" r="17" fill="none" stroke="url(#gold-horiz)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.8"/>
  <!-- Tick marks -->
  <g stroke="url(#gold-horiz)" stroke-width="1.3" stroke-linecap="round">
    <line x1="24" y1="9"   x2="24" y2="12.5"/>
    <line x1="39" y1="13"  x2="36.5" y2="15.5"/>
    <line x1="43" y1="24"  x2="39.5" y2="24"/>
    <line x1="39" y1="35"  x2="36.5" y2="32.5"/>
    <line x1="24" y1="39"  x2="24" y2="35.5"/>
    <line x1="9"  y1="35"  x2="11.5" y2="32.5"/>
    <line x1="5"  y1="24"  x2="8.5"  y2="24"/>
    <line x1="9"  y1="13"  x2="11.5" y2="15.5"/>
  </g>
  <!-- Needle -->
  <g transform="rotate(-25 24 24)">
    <path d="M24 11 L26 24 L22 24 Z" fill="url(#gold-radial)"/>
    <circle cx="24" cy="24" r="2.2" fill="#0a1628" stroke="url(#gold-horiz)" stroke-width="0.8"/>
  </g>
  <!-- Car -->
  <g transform="translate(11,28)">
    <path d="M0 6 L2.5 3.5 L10 2.5 L19 2.5 L21 3.5 L23.5 6 L23.5 8 L0 8 Z" fill="#0a1628"/>
    <line x1="3" y1="4.5" x2="20" y2="4.5" stroke="url(#gold-horiz)" stroke-width="0.5"/>
    <circle cx="6" cy="8.5" r="2.5" fill="#0a1628" stroke="url(#gold-horiz)" stroke-width="0.8"/>
    <circle cx="17.5" cy="8.5" r="2.5" fill="#0a1628" stroke="url(#gold-horiz)" stroke-width="0.8"/>
    <circle cx="6" cy="8.5" r="0.9" fill="url(#gold-horiz)"/>
    <circle cx="17.5" cy="8.5" r="0.9" fill="url(#gold-horiz)"/>
  </g>
</svg>
