{% extends "base.html" %}
{% block title %}Server Error — webuyanyvehicle UK{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-content reveal-scale">
        <div class="error-code">500</div>
        <h1>Something Went Wrong</h1>
        <p>We're experiencing a technical issue. Please try again in a few minutes, or contact us if the problem persists.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top: 16px;">
            <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="{{ url_for('contact') }}" class="btn btn-outline" style="margin-top: 16px; margin-left: 12px;">
            <i class="fas fa-envelope"></i> Contact Support
        </a>
    </div>
</section>
{% endblock %}
